<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home | Github Issue Tracker</title>

    <!-- daisyUI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font - geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;    
        }
    </style>
</head>

<body class="px-5 md:px-20 py-2 bg-[#F8FAFC] ">

    <section class="navbar bg-base-100 shadow-sm grid justify-center space-y-2 md:flex">
      <div class="flex-1 flex items-center gap-2">
        <img src="./assets/github-logo.png" class="w-6 h-6 lg:w-9 lg:h-9">
        <h1 class="font-semibold text-lg lg:text-2xl">GitHub Issues Tracker</h1>
      </div>
      <div class="flex gap-2">
        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
        <a class="btn btn-ghost text-sm bg-[#4A00FF] text-white"><i class="fa-solid fa-plus"></i> New Issue</a>
      </div>
    </section>

    <section class="my-15 grid space-y-4 ">
        <div role="tablist" class="tabs tabs-box ">
                <a id="all-tab" role="tab" class="tab tab-active bg-[#4A00FF] text-white w-15 md:w-30 h-10">All</a>
                <a id="open-tab" role="tab" class="tab  w-15 md:w-30 h-10">Open</a>
                <a id="closed-tab" role="tab" class="tab  w-15 md:w-30 h-10">Closed</a>
            </div>

            <div id="issue-container" class="">
                <div id="issue-dashboard">
                    <div class="flex">
                        <img src="./assets/Aperture.png" >
                        
                            <div class="grid">
                                <h2 class="font-bold">Total</h2>
                                <p id="total">8</p>
                    
                            </div>
                        
                    </div>
                </div>



                <div id="issue-cards" class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">

                </div>
            </div>
    </section>

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">

    <h3 id="modal-title" class="text-lg font-bold"></h3>

    <div class="flex items-center">
        <p id="modal-status" class="badge text-green-600"></p>
        <p id="modal-author" class="text-gray-500"></p>
        <p id="modal-date" class="text-gray-500"></p>
    </div>
    <div id="label">

    </div>
    <p id="modal-description" class="py-4 text-gray-500"></p>

    <p id="modal-assignee" class="text-gray-500"></p>

    <p id="modal-priority" class="badge text-red-500"></p>
    

    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>

  </div>
</dialog>

    <script src="./script/tracker.js"></script>
</body>


</html>
